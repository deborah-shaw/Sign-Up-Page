<!DOCTYPE html>
<html>

<head>
  <title> Sign Up Page </title>
  <link href="css/style.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
    rel="stylesheet">
</head>

<body>

  <div class="centered-container">

    <h1> Sign Up Page </h1>

    <form id="singupForm" action="welcome.html">
      <p>First Name: <input type="text" name="fName"></p>
      <p>Last Name: <input type="text" name="lName"></p>

      <p>Gender:
        <input type="radio" id="Male" name="gender" value="m"><label for="Male">Male</label>
        <input type="radio" id="Female" name="gender" value="f"><label for="Female">Female</label>
      </p>

      <p>Zip Code: <input type="text" id="zip" name="zip"><span id="zipError"></span></p>

      <p>City: <span id="city"></span></p>

      <p>Latitude: <span id="latitude"></span></p>

      <p>Longitude: <span id="longitude"></span></p>

      <p>State:
        <select id="state" name="state">
          <option>Select One</option>
        </select>
      </p>

      <p>Select a County: <select id="county"></select></p>

      <p>Desired Username: <input type="text" id="username" name="username"></p>
      <p id="usernameError"></p>

      <p>Password: <input type="password" id="password"><span id="suggestedPassword"></span></p>
      <p id="invalidPassword"></p>
      <p>Type Password Again: <input type="password" id="retypePassword"></p>
      <p id="invalidRetypedPassword"></p>

      <input class="button" type="submit" value="Sign up!">
    </form>

    <script src="js/script.js"></script>

  </div>

</body>

</html>
